name: CI - RFY Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      AI_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      ENCRYPTION_KEY: ci-test-encryption-key-32chars-minimum
      UPLOAD_DIR: .uploads

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare uploads dir
        run: mkdir -p .uploads

      - name: Migrate database
        run: node scripts/db-migrate-node.js

      - name: Lint
        run: npm run lint

      - name: Run unit and integration tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Playwright)
        env:
          CI: '1'
          E2E_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e
