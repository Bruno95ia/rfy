<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Engine Logo — Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
      color: #1e293b;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      background: #fff;
    }
    .card.dark { background: #1e293b; }
    .card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 1rem; }
    .card.dark h2 { color: #94a3b8; }
    .card img { width: 80px; height: 80px; }
    .card.small img { width: 16px; height: 16px; image-rendering: pixelated; }
  </style>
</head>
<body>
  <h1>Revenue Engine — Símbolo</h1>
  <p>Loop contínuo ascendente. Ciclo de receita, engine, crescimento previsível.</p>

  <div class="grid">
    <div class="card">
      <h2>Principal (#4F46E5)</h2>
      <img src="revenue-engine-symbol.svg" alt="Logo principal" />
    </div>
    <div class="card">
      <h2>Monocromático</h2>
      <img src="revenue-engine-symbol-black.svg" alt="Logo preto" />
    </div>
    <div class="card dark">
      <h2>Branco (fundo escuro)</h2>
      <img src="revenue-engine-symbol-white.svg" alt="Logo branco" />
    </div>
    <div class="card">
      <h2>Favicon</h2>
      <img src="revenue-engine-symbol-favicon.svg" alt="Logo favicon" />
    </div>
    <div class="card small">
      <h2>16px</h2>
      <img src="revenue-engine-symbol.svg" alt="Logo 16px" />
    </div>
    <div class="card dark small">
      <h2>16px branco</h2>
      <img src="revenue-engine-symbol-white.svg" alt="Logo 16px branco" />
    </div>
  </div>
</body>
</html>
