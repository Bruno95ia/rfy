# Revenue Engine - stack local (App + AI + Postgres + Redis + MLflow)
# Compatível com Compose v2+

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AI_SERVICE_URL: http://ai-service:8001
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres}
      AI_DATABASE_URL: ${COMPOSE_AI_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-rfy-local-dev-encryption-key-change-me}
      UPLOAD_DIR: /data/uploads
    volumes:
      - app-uploads:/data/uploads
    depends_on:
      ai-service:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      AI_DATABASE_URL: ${COMPOSE_AI_DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres}
      AI_ARTIFACTS_PATH: /artifacts
      AI_K_ANONYMITY: 5
      AI_CORS_ORIGINS: ${AI_CORS_ORIGINS:-*}
      AI_DEBUG: ${AI_DEBUG:-true}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    volumes:
      - ai-artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # Imagem completa (não -alpine): evita falhas intermitentes do daemon "layer does not exist" em alguns hosts.
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-sqlite:///mlflow/artifacts/mlflow.db}
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ai-artifacts:
  mlflow-artifacts:
  app-uploads:
